name: Deploy to GitHub Pages

on:
  workflow_dispatch: # Triggered manually from Admin Panel

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kcet-ranks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './kcet-ranks/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Generate Static Site Pages (SSG)
        run: node scripts/generate-static-site.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './kcet-ranks/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
