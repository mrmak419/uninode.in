      gtag('config', 'G-GXLJQVP9T0');
      
      // Delay loading the heavy GA script until after the page is fully interactive
      window.addEventListener('load', function() {

          var script = document.createElement('script');
          script.src = "https://www.googletagmanager.com/gtag/js?id=G-GXLJQVP9T0";

  <body>
    <div id="root">
      <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        .app-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #f8fafc;
          font-family: 'DM Sans', sans-serif;
          color: #0f172a;
        }
        .app-loader .spinner {
          width: 40px;
          height: 40px;
          border: 3px solid #e2e8f0;
          border-top: 3px solid #3b82f6;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 1rem;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <div class="app-loader">
        <div class="spinner"></div>
        <h1 style="font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem 0; text-align: center;">KCET Cutoffs & Rank Analyzer</h1>
        <div style="font-size: 1.1rem; font-weight: 500;">Loading...</div>
